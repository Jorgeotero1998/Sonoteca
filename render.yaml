databases:
  - name: sonoteca-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: sonoteca-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sonoteca-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALG
        value: HS256
      - key: ACCESS_TOKEN_TTL_MIN
        value: "60"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: sonoteca-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sonoteca-api.onrender.com

